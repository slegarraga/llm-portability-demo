name: Bug report
description: Report demo output or setup that behaves incorrectly
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: Thanks for the report. The demo should run offline without API keys.
  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of node --version.
      placeholder: v22.16.0
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and output
      description: Command you ran and the output or error.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected the offline demo to show, and what happened instead.
    validations:
      required: true
